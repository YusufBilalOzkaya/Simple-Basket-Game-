name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manuel tetikleme için (test amaçlı)

# Gerekli tüm izinler burada tanımlı
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build Raylib for Web
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git raylib_src
          cd raylib_src/src
          make PLATFORM=PLATFORM_WEB -e
          cp libraylib.a ../../libraylib_web.a || cp libraylib.web.a ../../libraylib_web.a
          cd ../..

      - name: Build Project with Emscripten
        run: |
          emcc main.cpp -o index.html \
            -I. -I./raylib_src/src \
            ./libraylib_web.a \
            -s USE_GLFW=3 -s WASM=1 -s ASYNCIFY \
            -s GL_ENABLE_GET_PROC_ADDRESS=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --preload-file pota.png \
            -DPLATFORM_WEB

      # BURASI KRİTİK: Dosyaları paketle
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sadece gereken dosyaları gönderiyoruz (./ noktası tüm klasörü kapsar)
          path: '.'

      # BURASI KRİTİK: Doğrudan yayına al
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
